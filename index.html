<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jornada Fitness</title>
    <link rel="stylesheet" href="style.css">
    <script defer src="app.js"></script>
    <script defer src="db.js"></script>
</head>

<body>
    <div id="app">

        <!-- NAV -->
        <nav class="navbar">
            <button onclick="trocarTela('home')" id="btnHome">🏋️</button>
            <button onclick="trocarTela('historico')" id="btnHistorico">📅</button>
            <button onclick="trocarTela('notas')" id="btnNotas">📝</button>
            <button onclick="trocarTela('dashboard')" id="btnDashboard">📊</button>
        </nav>

        <!-- TELA PRINCIPAL -->
        <section id="home" class="tela ativa">
            <h1>Contador de Treinos</h1>
            <p>sua jornada fitness</p>

            <div class="contador-grande" id="contador">0</div>
            <p>de 200 dias no ano</p>

            <!-- Barra de progresso -->
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>

            <div class="stats">
                <div class="stat-box">
                    <div id="diasRestantes">200</div>
                    dias restantes
                </div>
                <div class="stat-box">
                    <div id="diasMeta">0</div>
                    dias até a meta
                </div>
            </div>

            <button class="btn-add" onclick="adicionarTreino()">Dia de Treino</button>
            <button class="btn-save" onclick="salvarRegistro()">Salvar Registro</button>
            <button class="btn-reset" onclick="resetar()">Resetar</button>

            <div class="motivacional" id="motivacional">Vamos começar! 💪🔥</div>
        </section>

        <!-- TELA HISTÓRICO -->
        <section id="historico" class="tela">
            <h2>Histórico de Treinos 📅</h2>
            <ul id="listaHistorico"></ul>
        </section>

        <!-- TELA NOTAS -->
        <section id="notas" class="tela">
            <h2>Notas do Treino 📝</h2>
            <textarea id="campoNota" placeholder="Escreva aqui detalhes do treino..."></textarea>
            <button onclick="salvarNota()">Salvar Nota</button>

            <h3>Notas Salvas:</h3>
            <ul id="listaNotas"></ul>
        </section>

        <!-- DASHBOARD -->
        <section id="dashboard" class="tela">
            <h2>Progresso Mensal 📊</h2>
            <canvas id="grafico"></canvas>
        </section>
    </div>
</body>
</html>
