<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Desafio 200 Dias</title>

  <style>
    :root {
      --primary: #6C63FF;
      --secondary: #00C9A7;
      --accent: #FF6584;
      --bg: #0f172a;
      --card: #1e293b;
      --text: #ffffff;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    header {
      text-align: center;
      padding: 15px;
      font-size: 22px;
      background: linear-gradient(45deg, var(--primary), var(--secondary));
    }

    .container {
      padding: 20px;
      max-width: 600px;
      margin: auto;
    }

    .card {
      background: var(--card);
      padding: 20px;
      border-radius: 15px;
      margin-bottom: 20px;
    }

    .big {
      font-size: 60px;
      text-align: center;
    }

    .progress {
      height: 20px;
      background: #333;
      border-radius: 10px;
      overflow: hidden;
      margin-top: 10px;
    }

    .bar {
      height: 100%;
      background: linear-gradient(90deg, var(--secondary), var(--accent));
      width: 0%;
    }

    button {
      padding: 10px 15px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      margin: 5px;
    }

    .primary { background: var(--primary); color: white; }
    .danger { background: var(--accent); color: white; }

    input, textarea {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 8px;
      border: none;
    }

    .nav {
      display: flex;
      justify-content: space-around;
      margin-top: 20px;
    }

    .hidden { display: none; }

    ul { list-style: none; padding: 0; }

    li {
      background: #334155;
      margin: 5px 0;
      padding: 10px;
      border-radius: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
  </style>
</head>
<body>

<header>🔥 Desafio 200 Dias 🔥</header>

<div class="container">

  <div id="home" class="screen">
    <div class="card">
      <div class="big" id="contador">0</div>
      <div>dias de treino</div>

      <div class="progress">
        <div class="bar" id="barra"></div>
      </div>

      <p id="motivacao"></p>

      <input type="date" id="dataTreino" />
      <textarea id="nota" placeholder="Notas do treino..."></textarea>

      <button class="primary" onclick="registrar()">Registrar Treino</button>
      <button class="danger" onclick="resetar()">Resetar</button>
    </div>
  </div>

  <div id="historico" class="screen hidden">
    <div class="card">
      <h3>Histórico</h3>
      <ul id="lista"></ul>
    </div>
  </div>

  <div id="dashboard" class="screen hidden">
    <div class="card">
      <h3>Treinos por mês</h3>
      <canvas id="grafico"></canvas>
    </div>
  </div>

  <div class="nav">
    <button onclick="trocar('home')">Home</button>
    <button onclick="trocar('historico')">Histórico</button>
    <button onclick="trocar('dashboard')">Dashboard</button>
  </div>

</div>

<script>
const META = 200;
let db;

function initDB() {
  const request = indexedDB.open("treinoDB", 1);

  request.onupgradeneeded = e => {
    db = e.target.result;
    db.createObjectStore("treinos", { keyPath: "id", autoIncrement: true });
  };

  request.onsuccess = e => {
    db = e.target.result;
    atualizar();
  };
}

function registrar() {
  const data = document.getElementById("dataTreino").value || new Date().toISOString().split("T")[0];
  const nota = document.getElementById("nota").value;

  const tx = db.transaction("treinos", "readwrite");
  tx.objectStore("treinos").add({ data, nota });

  tx.oncomplete = () => {
    document.getElementById("nota").value = "";
    atualizar();
  };
}

function getAll(callback) {
  const tx = db.transaction("treinos", "readonly");
  const store = tx.objectStore("treinos");
  const req = store.getAll();
  req.onsuccess = () => callback(req.result);
}

function deletar(id) {
  const tx = db.transaction("treinos", "readwrite");
  tx.objectStore("treinos").delete(id);
  tx.oncomplete = atualizar;
}

function atualizar() {
  getAll(data => {
    const total = data.length;
    document.getElementById("contador").innerText = total;

    const progresso = (total / META) * 100;
    document.getElementById("barra").style.width = progresso + "%";

    document.getElementById("motivacao").innerText = mensagem(total);

    const lista = document.getElementById("lista");
    lista.innerHTML = "";

    data.forEach(item => {
      const li = document.createElement("li");
      li.innerHTML = `${item.data} - ${item.nota || ''} <button onclick="deletar(${item.id})">❌</button>`;
      lista.appendChild(li);
    });

    gerarGrafico(data);
  });
}

function mensagem(n) {
  if (n < 20) return "🚀 Começando!";
  if (n < 100) return "🔥 Mantém o ritmo!";
  if (n < 180) return "💪 Você é imparável!";
  return "🏆 Quase lá!";
}

function resetar() {
  const tx = db.transaction("treinos", "readwrite");
  const store = tx.objectStore("treinos");
  store.clear();
  tx.oncomplete = atualizar;
}

function trocar(tela) {
  document.querySelectorAll(".screen").forEach(s => s.classList.add("hidden"));
  document.getElementById(tela).classList.remove("hidden");
}

function gerarGrafico(data) {
  const meses = Array(12).fill(0);

  data.forEach(t => {
    const m = new Date(t.data).getMonth();
    meses[m]++;
  });

  const ctx = document.getElementById("grafico").getContext("2d");
  if (window.chart) window.chart.destroy();

  window.chart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'],
      datasets: [{ data: meses }]
    }
  });
}

// default hoje
window.onload = () => {
  document.getElementById("dataTreino").value = new Date().toISOString().split("T")[0];
  initDB();
};
</script>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</body>
</html>
