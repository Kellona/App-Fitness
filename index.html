<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Painel Fitness Completo</title>
    
    <!-- CSS Externo -->
    <link rel="stylesheet" href="style.css" />

    <!-- Chart.js para os gráficos -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

    <div class="container" id="appContainer">

        <h1>Seu Painel Fitness</h1>

        <!-- ABAS -->
        <div class="tabs">
            <div class="tab active" onclick="abrirAba('treinos')" id="tabTreinos">Treinos</div>
            <div class="tab" onclick="abrirAba('peso')" id="tabPeso">Peso & IMC</div>
            <div class="tab" onclick="abrirAba('inj')" id="tabInj">Injeções</div>
            <div class="tab" onclick="abrirAba('nuvem')" id="tabNuvem">☁️ Nuvem</div>
        </div>

        <!-- ABA TREINOS -->
        <div id="abaTreinos">
            <div class="contador" id="contador">0</div>
            <div class="faltam" id="faltamDias"></div>
            <p>de 200 dias</p>

            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>

            <button class="btn-add" onclick="abrirRegistroData()">Registrar Treino</button>
            <button class="btn-save" onclick="salvarRegistro()">Salvar Hoje</button>
            <button class="btn-reset" onclick="resetar()">Resetar</button>
            <button class="btn-treino" onclick="mostrarTreinoDia()">Ver Treino de Hoje</button>

            <div id="boxTreino" style="display:none; background:#eef3ff; padding:20px; margin-top:20px; border-radius:12px; text-align:left;"></div>
            <div class="historic-box" id="historicoLista"></div>

            <h2>Gráfico Mensal</h2>
            <canvas id="graficoMensal" width="350" height="200"></canvas>
        </div>

        <!-- ABA PESO -->
        <div id="abaPeso" style="display:none;">
            <h2>Registrar Peso</h2>
            <input type="date" id="dataPeso" style="width:100%; padding:10px; box-sizing: border-box;">
            <input type="number" id="pesoInput" placeholder="Peso (kg)" style="width:100%; padding:10px; margin-top:10px; box-sizing: border-box;">

            <button class="btn-save" onclick="registrarPeso()">Salvar Peso</button>

            <h3 style="margin-top:20px;">Histórico</h3>
            <div class="historic-box" id="listaPeso"></div>

            <h2>Evolução do Peso</h2>
            <canvas id="graficoPeso" width="350" height="200"></canvas>
        </div>

        <!-- ABA INJEÇÕES -->
        <div id="abaInj" style="display:none;">
            <h2>💉 Aplicações</h2>

            <label>Data da aplicação</label>
            <input type="date" id="dataInjecao" style="width:100%;padding:10px;margin-bottom:15px;">

            <label>Dose</label>
            <select id="doseInjecao" style="width:100%;padding:10px;margin-bottom:15px;">
                <option value="2,5 mg">2,5 mg</option>
                <option value="5 mg">5 mg</option>
                <option value="7,5 mg">7,5 mg</option>
                <option value="10 mg">10 mg</option>
                <option value="12,5 mg">12,5 mg</option>
                <option value="15 mg">15 mg</option>
            </select>

            <button class="btn-inj" onclick="registrarInjecao()">
                💾 Salvar Aplicação
            </button>

            <div id="proximaAplicacao" style="margin-top:20px; padding:15px; background:#eef3ff; border-radius:10px; font-weight:bold;">
            </div>

            <h3 style="margin-top:20px;">Histórico</h3>
            <div class="historic-box" id="listaInjecoes"></div>
        </div>

        <!-- ABA NUVEM -->
        <div id="abaNuvem" style="display:none;">
            <h2>☁️ Sincronização GitHub</h2>
            <p style="font-size: 13px; color: #666;">Configure para salvar seus dados na nuvem e acessar em qualquer dispositivo.</p>

            <input type="text" id="gistIdInput" placeholder="ID do Gist" style="width:100%; padding:10px; margin-bottom:10px; box-sizing: border-box;">
            <input type="password" id="gistTokenInput" placeholder="GitHub Personal Token" style="width:100%; padding:10px; margin-bottom:10px; box-sizing: border-box;">

            <button class="btn-save" onclick="salvarConfigNuvem()">Salvar Configurações</button>
            <hr style="margin: 20px 0; border: 0; border-top: 1px solid #ddd;">

            <button class="btn-treino" onclick="uploadParaNuvem()">⬆️ Enviar dados para o GitHub</button>
            <button class="btn-add" onclick="downloadDaNuvem(true)" style="margin-top: 10px;">⬇️ Baixar dados do GitHub</button>
        </div>

    </div>

    <!-- Modal Treino -->
    <div id="modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); justify-content:center; align-items:center; z-index: 1000;">
        <div style="background:white; padding:20px; width:300px; border-radius:12px; text-align:center;">
            <h3>Data do Treino</h3>
            <input type="date" id="dataTreino" style="padding:10px; width:100%; box-sizing: border-box;">

            <button style="margin-top:10px; background:#4a57ff; color:white; padding:10px; width:100%; border-radius:10px;" onclick="registrarDataEscolhida()">Registrar</button>
            <button style="margin-top:10px; background:#aaa; padding:10px; width:100%; border-radius:10px; color: white;" onclick="fecharModal()">Cancelar</button>
        </div>
    </div>

    <!-- JavaScript Externo -->
    <script src="script.js"></script>
</body>
</html>
